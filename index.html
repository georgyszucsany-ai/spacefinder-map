<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpaceFinder Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"
  />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .space-label {
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid #d0d7de;
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
      padding: 4px 6px;
      font-size: 11px;
      font-weight: 600;
      color: #222;
      white-space: nowrap;
    }

    .leaflet-tooltip.space-label::before {
      display: none;
    }

    .space-popup {
      font-size: 13px;
      line-height: 1.4;
    }

    .space-popup b {
      font-size: 14px;
    }

    .space-sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2000;
      background: #ffffff;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.18);
      padding: 20px 20px 24px;
      transform: translateY(100%);
      transition: transform 0.25s ease;
      max-height: 72vh;
      overflow-y: auto;
    }

    .space-sheet.open {
      transform: translateY(0);
    }

    .space-sheet-handle {
      width: 48px;
      height: 5px;
      border-radius: 999px;
      background: #d1d5db;
      margin: 0 auto 16px;
    }

    .space-sheet-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .space-sheet-title {
      font-size: 28px;
      font-weight: 700;
      color: #0f172a;
      margin: 0;
      line-height: 1.1;
    }

    .space-sheet-subtitle {
      margin: 8px 0 0;
      color: #64748b;
      font-size: 16px;
    }

    .space-badge {
      background: #dcfce7;
      color: #22c55e;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
    }

    .space-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 20px 0;
    }

    .space-card {
      background: #f3f4f6;
      border-radius: 18px;
      padding: 16px;
    }

    .space-card-title {
      font-size: 14px;
      color: #0f172a;
      font-weight: 700;
      margin: 0 0 4px;
    }

    .space-card-text {
      font-size: 14px;
      color: #64748b;
      margin: 0;
    }

    .space-section-title {
      font-size: 18px;
      font-weight: 700;
      color: #0f172a;
      margin: 24px 0 12px;
    }

    .space-description {
      font-size: 16px;
      line-height: 1.6;
      color: #64748b;
      margin: 0;
    }

    .space-actions {
      display: flex;
      gap: 14px;
      margin-top: 24px;
    }

    .space-btn {
      border: none;
      border-radius: 999px;
      padding: 16px 22px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .space-btn-primary {
      flex: 1;
      background: #062e63;
      color: #ffffff;
    }

    .space-btn-secondary {
      background: #ffffff;
      color: #062e63;
      border: 2px solid #062e63;
    }

    @media (max-width: 640px) {
      .space-grid {
        grid-template-columns: 1fr;
      }

      .space-sheet-title {
        font-size: 24px;
      }

      .space-actions {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div id="spaceSheet" class="space-sheet">
    <div class="space-sheet-handle"></div>

    <div class="space-sheet-top">
      <div>
        <h2 id="sheetName" class="space-sheet-title">Space name</h2>
        <p id="sheetSubtitle" class="space-sheet-subtitle">Space type</p>
      </div>
      <div id="sheetAvailability" class="space-badge">Available</div>
    </div>

    <div class="space-grid">
      <div class="space-card">
        <p class="space-card-title" id="sheetWalk">4 min walk</p>
        <p class="space-card-text">From your location</p>
      </div>

      <div class="space-card">
        <p class="space-card-title" id="sheetNoise">Silent</p>
        <p class="space-card-text">Sound level</p>
      </div>

      <div class="space-card">
        <p class="space-card-title" id="sheetCapacity">7 seats free</p>
        <p class="space-card-text">Currently free</p>
      </div>

      <div class="space-card">
        <p class="space-card-title" id="sheetBuilding">UCL Campus</p>
        <p class="space-card-text">Building</p>
      </div>
    </div>

    <h3 class="space-section-title">About this space</h3>
    <p id="sheetDescription" class="space-description">
      A good place to study.
    </p>

    <div class="space-actions">
      <button id="directionsBtn" class="space-btn space-btn-primary">Get Directions</button>
      <button id="closeSheetBtn" class="space-btn space-btn-secondary">Close</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

  <script>

    const spaces = [

      },

      {
        name: "Roberts Building Study Area",

        availability: "Available",
        capacity: "12 seats free",
        walk: "3 min walk",
        building: "Roberts Building",

      },
      {
        name: "Roberts Room 102",
        coords: [51.5228056, -0.1321667],

        subtype: "Silent",
        availability: "Available",
        capacity: "10 seats free",
        walk: "3 min walk",
        building: "Roberts Building",

      },
      {
        name: "Engineering Study Room",
        coords: [51.5228333, -0.1325278],
        type: "Team Collab",
        subtype: "Co-Lab",
        availability: "Available",
        capacity: "6 seats free",
        walk: "4 min walk",

      },
      {

        capacity: "18 seats free",

      },
      {

        coords: [51.52475, -0.1321111],

      {

      {

      },
      {

      },
      {
        name: "Seminar Room C",
        coords: [51.5250833, -0.1317222],

      },
      {
        name: "Common Room East",
        coords: [51.5264722, -0.1310556],
        type: "Open Study",

        building: "Common Room East",
        description: "A bright and relaxed shared space suited to casual studying and meeting up between classes."
      },
      {
        name: "Common Room West",
        coords: [51.5232222, -0.1320833],
        type: "Open Study",
        subtype: "Casual",
        availability: "Available",
        capacity: "11 seats free",
        walk: "4 min walk",
        building: "Common Room West",
        description: "A comfortable open study room with easy access and flexible seating."
      },
      {
        name: "Institute Lounge",
        coords: [51.5226944, -0.128],
        type: "Open Study",
        subtype: "Casual",
        availability: "Available",
        capacity: "13 seats free",
        walk: "5 min walk",
        building: "Institute Building",
        description: "A laid-back lounge environment appropriate for reading, laptop work, and quiet conversation."
      },
      {
        name: "Bartlett Studio Space",
        coords: [51.5258333, -0.1328611],
        type: "Team Collab",
        subtype: "Co-Lab",
        availability: "Busy",
        capacity: "3 of 22 seats free",
        walk: "6 min walk",
        building: "Bartlett",
        description: "A studio-style collaborative environment designed for creative and project-based work."
      },
      {
        name: "Torrington Place Study Hub",
        coords: [51.5219167, -0.1346667],
        type: "Open Study",
        subtype: "Casual",
        availability: "Available",
        capacity: "21 seats free",
        walk: "7 min walk",
        building: "Torrington Place",
        description: "A larger study hub with plenty of seating for independent work in a casual environment."
      },
      {
        name: "Cruciform Study Space",
        coords: [51.5240278, -0.1351111],
        type: "Deep Focus",
        subtype: "Silent",
        availability: "Available",
        capacity: "14 seats free",
        walk: "4 min walk",
        building: "Cruciform Building",
        description: "A quiet study space with strong focus energy, well suited to reading and revision."
      },
      {
        name: "Quiet Rest Pod - Wilkins",
        coords: [51.5249444, -0.1338056],
        type: "Private / Nap",
        subtype: "Rest",
        availability: "Nearly Full",
        capacity: "1 of 4 pods free",
        walk: "4 min walk",
        building: "Wilkins Building",
        description: "A quiet private pod for brief rest, decompression, or stepping away from busy study areas."
      }
    ];

    const markers = [];
    const markerEntries = [];
    let selectedSpace = null;
    let userLocation = null;
    let userLocationMarker = null;
    let userAccuracyCircle = null;
    let hasCenteredOnUser = false;
    let routingControl = null;

    const spaceSheet = document.getElementById("spaceSheet");
    const sheetName = document.getElementById("sheetName");
    const sheetSubtitle = document.getElementById("sheetSubtitle");
    const sheetAvailability = document.getElementById("sheetAvailability");
    const sheetWalk = document.getElementById("sheetWalk");
    const sheetNoise = document.getElementById("sheetNoise");
    const sheetCapacity = document.getElementById("sheetCapacity");
    const sheetBuilding = document.getElementById("sheetBuilding");
    const sheetDescription = document.getElementById("sheetDescription");
    const directionsBtn = document.getElementById("directionsBtn");
    const closeSheetBtn = document.getElementById("closeSheetBtn");

    function getColor(status) {
      if (status === "Available") return "#22c55e";
      if (status === "Nearly Full") return "#f59e0b";
      if (status === "Busy") return "#f97316";
      if (status === "Full") return "#ef4444";
      return "#3b82f6";
    }

    function getBadgeColors(status) {
      if (status === "Available") {
        return { bg: "#dcfce7", text: "#22c55e" };
      }
      if (status === "Nearly Full") {
        return { bg: "#fef3c7", text: "#d97706" };
      }
      if (status === "Busy") {
        return { bg: "#ffedd5", text: "#ea580c" };
      }
      if (status === "Full") {
        return { bg: "#fee2e2", text: "#dc2626" };
      }
      return { bg: "#dbeafe", text: "#2563eb" };
    }

    function openSpaceSheet(space) {
      selectedSpace = space;

      sheetName.textContent = space.name;
      sheetSubtitle.textContent = `${space.type} · ${space.subtype}`;
      sheetAvailability.textContent = space.availability;
      sheetWalk.textContent = space.walk;
      sheetNoise.textContent = space.subtype;
      sheetCapacity.textContent = space.capacity;
      sheetBuilding.textContent = space.building || "Campus Space";
      sheetDescription.textContent = space.description || "A good place to study.";

      const badgeColors = getBadgeColors(space.availability);
      sheetAvailability.style.background = badgeColors.bg;
      sheetAvailability.style.color = badgeColors.text;

      spaceSheet.classList.add("open");
    }

    function closeSpaceSheet() {
      spaceSheet.classList.remove("open");
      selectedSpace = null;
    }

    function findMarkerBySpaceName(spaceName) {
      const entry = markerEntries.find(({ space }) => space.name === spaceName);
      return entry ? entry.marker : null;
    }

    function clearRoute() {
      if (routingControl) {
        map.removeControl(routingControl);
        routingControl = null;
      }
    }

    function focusSpaceByName(spaceName, options = {}) {
      const {
        zoom = 18,
        openSheet = true,
        openMarkerPopup = true,
        animate = true
      } = options;

      const space = spaces.find(s => s.name === spaceName);
      if (!space) return;

      showSpaces([space]);

      map.flyTo(space.coords, zoom, {
        animate,
        duration: 0.8
      });

      const marker = findMarkerBySpaceName(space.name);

      if (marker) {
        setTimeout(() => {
          if (openMarkerPopup) {
            marker.openPopup();
          }
          if (zoom >= 18) {
            marker.openTooltip();
          }
        }, 350);
      }

      if (openSheet) {
        openSpaceSheet(space);
      }
    }

    function startRouteToSpaceByName(spaceName) {
      const space = spaces.find(s => s.name === spaceName);
      if (!space || !userLocation) return;

      const marker = findMarkerBySpaceName(space.name);

      showSpaces([space]);

      const start = L.latLng(userLocation.lat, userLocation.lng);
      const end = L.latLng(space.coords[0], space.coords[1]);

      clearRoute();

      routingControl = L.Routing.control({
        waypoints: [start, end],
        routeWhileDragging: false,
        show: false,
        addWaypoints: false,
        draggableWaypoints: false,
        fitSelectedRoutes: true,
        createMarker: function() {
          return null;
        },
        lineOptions: {
          styles: [{ color: "#2563eb", weight: 5, opacity: 0.9 }]
        }
      }).addTo(map);

      if (marker) {
        setTimeout(() => {
          marker.openPopup();
          marker.openTooltip();
        }, 350);
      }

      closeSpaceSheet();
    }

    function updateUserLocation(position) {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      const accuracy = position.coords.accuracy || 0;

      userLocation = { lat, lng, accuracy };

      if (!userLocationMarker) {
        userLocationMarker = L.circleMarker([lat, lng], {
          radius: 8,
          fillColor: "#2563eb",
          color: "#ffffff",
          weight: 3,
          opacity: 1,
          fillOpacity: 1
        }).addTo(map);

        userLocationMarker.bindPopup("Your location");
      } else {
        userLocationMarker.setLatLng([lat, lng]);
      }

      if (!userAccuracyCircle) {
        userAccuracyCircle = L.circle([lat, lng], {
          radius: accuracy,
          color: "#2563eb",
          weight: 1,
          opacity: 0.35,
          fillColor: "#93c5fd",
          fillOpacity: 0.2
        }).addTo(map);
      } else {
        userAccuracyCircle.setLatLng([lat, lng]);
        userAccuracyCircle.setRadius(accuracy);
      }

      if (!hasCenteredOnUser) {
        hasCenteredOnUser = true;
        map.setView([lat, lng], 17);
      }
    }

    function handleLocationError() {
      console.warn("Location access was denied or unavailable.");
    }

    if (navigator.geolocation) {
      navigator.geolocation.watchPosition(
        updateUserLocation,
        handleLocationError,
        {
          enableHighAccuracy: true,
          maximumAge: 10000,
          timeout: 15000
        }
      );
    }

    directionsBtn.addEventListener("click", () => {
      if (!selectedSpace || !userLocation) return;

      const start = L.latLng(userLocation.lat, userLocation.lng);
      const end = L.latLng(selectedSpace.coords[0], selectedSpace.coords[1]);

      if (routingControl) {
        map.removeControl(routingControl);
      }

      routingControl = L.Routing.control({
        waypoints: [start, end],
        routeWhileDragging: false,
        show: false,
        addWaypoints: false,
        draggableWaypoints: false,
        fitSelectedRoutes: true,
        createMarker: function() {
          return null;
        },
        lineOptions: {
          styles: [{ color: "#2563eb", weight: 5, opacity: 0.9 }]
        }
      }).addTo(map);

      closeSpaceSheet();
    });

    closeSheetBtn.addEventListener("click", closeSpaceSheet);

    spaces.forEach(space => {
      const marker = L.circleMarker(space.coords, {
        radius: 8,
        fillColor: getColor(space.availability),
        color: "#ffffff",
        weight: 2,
        opacity: 1,
        fillOpacity: 0.95
      });

      marker.bindTooltip(space.name, {
        direction: "top",
        offset: [0, -10],
        className: "space-label"
      });

      marker.bindPopup(`
        <div class="space-popup">
          <b>${space.name}</b><br>
          Type: ${space.type}<br>
          Category: ${space.subtype}<br>
          Availability: ${space.availability}<br>
          Capacity: ${space.capacity}<br>
          Walking time: ${space.walk}
        </div>
      `);

      marker.on("click", () => {
        openSpaceSheet(space);

        window.parent.postMessage({
          type: "marker-click",
          spaceName: space.name
        }, "*");
      });

      marker.addTo(map);
      markers.push(marker);
      markerEntries.push({ space, marker });
    });

    function showSpaces(filteredSpaces) {
      markerEntries.forEach(({ marker }) => {
        if (map.hasLayer(marker)) {
          map.removeLayer(marker);
        }
      });

      const bounds = [];

      markerEntries.forEach(({ space, marker }) => {
        const shouldShow = filteredSpaces.some(s => s.name === space.name);

        if (shouldShow) {
          marker.addTo(map);
          bounds.push(space.coords);
        }
      });

      if (bounds.length > 0) {
        map.fitBounds(bounds, { padding: [40, 40] });
      }

      updateTooltips();
    }

    function filterByCategory(category) {
      if (category === "All") {
        showSpaces(spaces);
        return;
      }

      const filtered = spaces.filter(space => space.type === category);
      showSpaces(filtered);
    }

    function showNearMe() {
      if (!userLocation) return;

      const withDistance = spaces.map(space => {
        const dx = space.coords[0] - userLocation.lat;
        const dy = space.coords[1] - userLocation.lng;
        const distance = Math.sqrt(dx * dx + dy * dy);
        return { ...space, distance };
      });

      withDistance.sort((a, b) => a.distance - b.distance);

      const nearest = withDistance.slice(0, 5);
      showSpaces(nearest);

      const bounds = nearest.map(space => space.coords);
      bounds.push([userLocation.lat, userLocation.lng]);

      if (bounds.length > 0) {
        map.fitBounds(bounds, { padding: [40, 40] });
      }
    }

    function updateTooltips() {
      const zoom = map.getZoom();

      markers.forEach(marker => {
        if (zoom >= 18 && map.hasLayer(marker)) {
          marker.openTooltip();
        } else {
          marker.closeTooltip();
        }
      });
    }

    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data || typeof data !== "object") return;

      if (data.type === "filter-spaces") {
        clearRoute();
        filterByCategory(data.category);
      }

      if (data.type === "near-me") {
        clearRoute();
        showNearMe();
      }

      if (data.type === "focus-space" && data.spaceName) {
        clearRoute();
        focusSpaceByName(data.spaceName, {
          zoom: 18,
          openSheet: true,
          openMarkerPopup: true,
          animate: true
        });
      }

      if (data.type === "start-route" && data.spaceName) {
        startRouteToSpaceByName(data.spaceName);
      }
    });

    map.on("zoomend", updateTooltips);
    updateTooltips();
  </script>
